apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cinetrackr
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: dulevnikola/cinetrackr-frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: VITE_API_URL
              value: "http://cinetrackr.local/api"