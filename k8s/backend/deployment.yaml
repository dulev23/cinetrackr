apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: cinetrackr
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: dulevnikola/cinetrackr-backend:latest
          ports:
            - containerPort: 8080

          env:
            - name: SPRING_DATA_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: mongo-uri

            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: CORS_ORIGINS